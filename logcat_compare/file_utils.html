<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>米娜的文件上传酱 ♪</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffeef8, #e0f7fa);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .upload-box {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .upload-box::before {
            content: "✿";
            position: absolute;
            font-size: 100px;
            top: -30px;
            right: -30px;
            opacity: 0.1;
            transform: rotate(20deg);
        }

        h1 {
            color: #ff6ac1;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        #drop-area {
            border: 3px dashed #ffb6e0;
            border-radius: 15px;
            padding: 60px 20px;
            background: #fff0f8;
            transition: all 0.3s;
            cursor: pointer;
        }

        #drop-area.highlight {
            border-color: #ff6ac1;
            background: #ffe6f5;
        }

        #drop-area i {
            font-size: 60px;
            color: #ff9edc;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: #ff8dd1;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 141, 209, 0.4);
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 141, 209, 0.6);
        }

        #file-list {
            margin-top: 20px;
            text-align: left;
        }

        .file-item {
            background: #fdf2f8;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.4s;
        }

        progress {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="upload-box">
        <h1>米娜的文件上传酱 ♪</h1>
        <p>把文件拖到这里，或者点击选择哦～</p>

        <div id="drop-area">
            <i>📁</i>
            <p>拖拽文件到这里<br>或</p>
            <label for="fileElem" class="btn">选择文件</label>
            <input type="file" id="fileElem" multiple>
        </div>

        <div id="file-list"></div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileElem = document.getElementById('fileElem');
        const fileList = document.getElementById('file-list');

        // 防止默认拖拽行为
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 高亮效果
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('highlight'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('highlight'), false);
        });

        // 处理拖拽上传
        dropArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        // 点击选择文件
        fileElem.addEventListener('change', () => {
            handleFiles(fileElem.files);
        });

        function handleFiles(files) {
            [...files].forEach(uploadFile);
        }

        function uploadFile(file) {
            file.text().then(text => {
                let lines = text.split('\n');
                let newLines = [];
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    if (line.trim() !== '') {
                        newLines.push(line);
                    }
                }
                for (let i = 0; i < newLines.length; i++) {
                    if (newLines[i].includes("power on start time")) {
                        if (!newLines[i + 1].includes("wait-for-device"))
                            console.log(newLines[i + 1]);
                    }
                }
            });
        }
    </script>
</body>

</html>
