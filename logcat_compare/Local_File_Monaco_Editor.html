<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor - Local File Viewer</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            height: 50px;
            background-color: #2d2d2d;
            border-bottom: 1px solid #3e3e3e;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        #editor-container {
            flex-grow: 1;
            width: 100%;
        }

        /* Custom File Input Styling */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn {
            border: 1px solid #007acc;
            color: white;
            background-color: #007acc;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #005f9e;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #file-name-display {
            font-size: 14px;
            color: #9cdcfe;
        }
    </style>
</head>

<body>

    <div id="app">
        <header>
            <div class="file-input-wrapper">
                <button class="btn">📂 打开文件 (Open File)</button>
                <input type="file" id="file-input">
            </div>
            <span id="file-name-display">未选择文件</span>
        </header>
        <div id="editor-container"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

        let editor = null;
        let dates = [
            "2025-12-01 23:18:38",113,
            "2025-12-01 19:45:38",77,
            "2025-12-01 21:34:13",95,
            "2025-12-01 17:19:38",52,
            "2025-12-01 13:54:02",16,
            "2025-12-01 21:09:17",91,
            "2025-12-01 20:55:43",89,
            "2025-12-01 17:44:48",56,
            "2025-12-01 17:26:04",53,
            "2025-12-02 00:20:09",124,
            "2025-12-01 16:14:47",41,
            "2025-12-01 13:17:55",10,
            "2025-12-01 12:40:27",4,
            "2025-12-02 00:08:39",122,
            "2025-12-01 20:09:44",81,
            "2025-12-01 19:51:19",78,
            "2025-12-01 16:04:08",39,
            "2025-12-01 15:50:16",37,
            "2025-12-01 23:24:38",114,
            "2025-12-01 16:55:17",48,
            "2025-12-01 21:56:43",99,
            "2025-12-01 20:27:31",84,
            "2025-12-01 18:41:33",66,
            "2025-12-01 15:38:23",35,
            "2025-12-01 14:21:18",21,
            "2025-12-01 21:45:39",97,
            "2025-12-01 21:51:01",98,
        ];

        function checkDataStr(line) {
            for (let i = 0; i < dates.length; i++) {
                if (line.includes(dates[i])) {
                    return true;
                }
            }
            return false;
        }

        function isLogStart(line) {
            if (checkDataStr(line) && line.includes("Runtimes:")) {
                return true;
            }
            return false;
        }

        function isLogEnd(line) {
            if (!checkDataStr(line) && line.includes("Runtimes:")) {
                return true;
            }
            return false;
        }

        function filter_log(content) {
            let lines = content.split('\n');
            let newLines = [];
            let matchStart = false;
            for (let i = 0; i < lines.length; i++) {
                if (isLogStart(lines[i])) {
                    matchStart = true;
                }
                if(matchStart && lines[i].trim() !== ""){
                    newLines.push(lines[i].trim());
                }
                if (isLogEnd(lines[i])) {
                    matchStart = false;
                }
            }
            return newLines.join('\n');
        }

        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: [
                    '// 欢迎使用本地文件编辑器',
                    '// 点击左上角的按钮选择一个文件来查看和编辑',
                    '// Welcome to the Local File Editor',
                    '// Click the button above to open a file'
                ].join('\n'),
                language: 'javascript',
                theme: 'vs-light',
                automaticLayout: true, // Automatically resize with window
                minimap: {
                    enabled: true
                },
                scrollBeyondLastLine: false
            });
        });
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name-display');

        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.textContent = `当前文件: ${file.name}`;

            const reader = new FileReader();

            reader.onload = function (e) {
                const content = e.target.result;

                if (editor) {
                    editor.setValue(filter_log(content));

                    const model = editor.getModel();
                    const ext = file.name.split('.').pop().toLowerCase();
                    const language = getLanguageFromExtension(ext);

                    monaco.editor.setModelLanguage(model, language);
                }
            };

            reader.readAsText(file);
        });

        function getLanguageFromExtension(ext) {
            const map = {
                'js': 'javascript', 'jsx': 'javascript',
                'ts': 'typescript', 'tsx': 'typescript',
                'html': 'html',
                'css': 'css',
                'scss': 'scss', 'less': 'less',
                'json': 'json',
                'py': 'python',
                'java': 'java',
                'c': 'c', 'cpp': 'cpp',
                'cs': 'csharp',
                'go': 'go',
                'php': 'php',
                'sql': 'sql',
                'md': 'markdown',
                'xml': 'xml',
                'yaml': 'yaml', 'yml': 'yaml',
                'sh': 'shell', 'bash': 'shell'
            };
            return map[ext] || 'plaintext';
        }
    </script>

</body>

</html>
